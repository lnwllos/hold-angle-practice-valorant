<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valorant Hold-Angle Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1b1b22;
      font-family: "Segoe UI", system-ui, sans-serif; color: #e8e8ec; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* Click-to-play blocker */
    #blocker { position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: rgba(15,15,20,0.72); cursor: pointer; z-index: 30; }
    #blocker .msg { text-align: center; }
    #blocker h1 { font-size: 26px; margin-bottom: 10px; letter-spacing: 1px; }
    #blocker p { opacity: 0.75; font-size: 14px; }

    /* HUD */
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #crosshair { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); }
    #stats { position: absolute; top: 14px; left: 16px; font-size: 13px; line-height: 1.5;
      text-shadow: 0 1px 2px #000; }
    #stats b { color: #4ad6c8; }
    #flash-overlay { position: absolute; inset: 0; background: #ffffff; opacity: 0;
      pointer-events: none; z-index: 20; }
    #nearsight-overlay { position: absolute; inset: 0; opacity: 0; pointer-events: none; z-index: 19;
      background: radial-gradient(circle at 50% 50%,
        rgba(0,0,0,0) 16%, var(--ns-tint, rgba(120,120,140,0.25)) 40%, rgba(6,6,10,0.94) 96%);
      -webkit-backdrop-filter: blur(var(--ns-blur, 0px)); backdrop-filter: blur(var(--ns-blur, 0px)); }
    #hitmarker { position: absolute; left: 50%; top: 50%; width: 18px; height: 18px;
      transform: translate(-50%, -50%) rotate(45deg); opacity: 0; pointer-events: none; z-index: 21; }
    #hitmarker::before, #hitmarker::after { content: ""; position: absolute; background: #fff;
      box-shadow: 0 0 2px #000; }
    #hitmarker::before { left: 8px; top: 0; width: 2px; height: 18px; }
    #hitmarker::after { left: 0; top: 8px; width: 18px; height: 2px; }
    #peek-hint { position: absolute; left: 50%; top: calc(50% + 60px); transform: translateX(-50%);
      display: none; font-size: 15px; font-weight: 700; color: #ffd27a; text-shadow: 0 2px 4px #000; }
    #shot-feedback-stack { position: absolute; left: 50%; top: calc(50% - 84px);
      transform: translateX(-50%); display: flex; flex-direction: column-reverse; align-items: center;
      gap: 4px; min-width: 150px; pointer-events: none; }
    .shot-feedback { min-width: 120px; text-align: center; font-size: 15px; font-weight: 700;
      letter-spacing: 0.4px; color: #e8e8ec; text-shadow: 0 2px 4px #000;
      animation: feedback-float 1100ms ease-out forwards; }
    .shot-feedback.fast { color: #ffb24f; }
    .shot-feedback.nearFast { color: #ffd27a; }
    .shot-feedback.perfect { color: #f5f7ff; }
    .shot-feedback.good { color: #4ad6c8; }
    .shot-feedback.nearSlow { color: #ff8f7a; }
    .shot-feedback.slow { color: #ff5a6b; }
    @keyframes feedback-float {
      0% { opacity: 0; transform: translateY(12px); }
      16% { opacity: 1; }
      72% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-34px); }
    }

    /* Settings panel */
    #settings { position: fixed; top: 0; right: 0; width: min(320px, 100vw); height: 100%;
      background: rgba(20,20,28,0.96); padding: 18px 18px 40px; overflow-y: auto; z-index: 40;
      box-shadow: -4px 0 18px rgba(0,0,0,0.4); display: none; }
    #settings.open { display: block; }
    #settings h2 { font-size: 16px; margin-bottom: 12px; color: #4ad6c8; }
    #settings .actions { margin: 0 0 14px; display: flex; gap: 8px; }
    #settings .actions button { margin-top: 0; }
    #settings .row { margin-bottom: 12px; }
    #settings label { display: block; font-size: 12px; margin-bottom: 4px; opacity: 0.85; }
    #settings input[type="range"] { width: 100%; }
    #settings select, #settings input[type="number"] { width: 100%; padding: 5px 7px;
      background: #2a2a36; color: #e8e8ec; border: 1px solid #3a3a48; border-radius: 4px; }
    #settings .val { float: right; color: #4ad6c8; }
    #settings .hint { font-size: 11px; opacity: 0.55; margin-top: 2px; }
    #settings button { margin-top: 8px; padding: 7px 12px; background: #4ad6c8; color: #11151a;
      border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <canvas id="crosshair" width="60" height="60"></canvas>
    <div id="shot-feedback-stack"></div>
    <div id="stats"></div>
    <div id="peek-hint">เคลียร์แล้ว — ถอยกลับหลังกำบัง</div>
    <div id="flash-overlay"></div>
    <div id="nearsight-overlay"></div>
    <div id="hitmarker"></div>
  </div>

  <div id="blocker"><div class="msg">
    <h1>HOLD ANGLE TRAINER</h1>
    <p>Click to play &nbsp;·&nbsp; ESC for settings</p>
  </div></div>

  <div id="settings"><h2>Settings</h2><div id="settings-body"></div></div>

  <!-- Three.js (global THREE) -->
  <script src="three.min.js"></script>
  <!-- Game (order matters: pure logic first, then glue, then composition root) -->
  <script src="js/constants.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/player.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/bot.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/targets.js"></script>
  <script src="js/peekmode.js"></script>
  <script src="js/flash.js"></script>
  <script src="js/eyeorb.js"></script>
  <script src="js/trackdrone.js"></script>
  <script src="js/weapon.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
